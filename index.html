<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <span class="container3D">
    <div class="container">
        <div class="screen"><span class="calcText"></span><span class="inputMarker">|</span></div>
        <div class="numpad">
            <div class="digits">
                <button class="btn" id="7"><span class="front">7</span></button>
                <button class="btn" id="8"><span class="front">8</span></button>
                <button class="btn" id="9"><span class="front">9</span></button>
                <button class="btn" id="4"><span class="front">4</span></button>
                <button class="btn" id="5"><span class="front">5</span></button>
                <button class="btn" id="6"><span class="front">6</span></button>
                <button class="btn" id="1"><span class="front">1</span></button>
                <button class="btn" id="2"><span class="front">2</span></button>
                <button class="btn" id="3"><span class="front">3</span></button>
                <button class="btn" id="0"><span class="front">0</span></button>
                <button class="btn" id="."><span class="front">.</span></button>
                <button class="btn" id="neg"><span class="front">+/-</span></button>
            </div>
            <div class="functions">
                <button class="btn" id="del"><span class="front">DEL</span></button>
                <button class="btn" id="ac"><span class="front">AC</span></button>
                <button class="btn" id="mult"><span class="front">&times</span></button>
                <button class="btn" id="divi"><span class="front">&divide</span></button>
                <button class="btn" id="add"><span class="front">+</span></button>
                <button class="btn" id="subt"><span class="front">-</span></button>
                <button class="btn" id="ans"><span class="front">ANS</span></button>
                <button class="btn" id="calc"><span class="front">=</span></button>      
            </div>
        </div>
    </div>
    </span>
</body>
</html>
